name: Link & HTML check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  link-check:
    name: Check for broken links and basic HTML issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee on HTML files
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,201,202,203,204,301,302,303,307,308,403,405,429,999
            --exclude '^http://www\.capstone\.cse\.msu\.edu/2023-08/projects/moii-ai/$'
            './**/*.html'
          fail: true
